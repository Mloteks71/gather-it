    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8802/healthcheck'')" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  binder:
    build:
      context: ../binder
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-jobads:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://rabbituser:rabbitpass@rabbitmq:5672/%2f
      - RABBITMQ_QUEUE_NAME=MappingQueue
      - RABBITMQ_CONSUMER_TAG=binder
      - DATABASE_URL=postgres://postgres:pL5dT78Uyu@postgres-jobads:5432/postgres
      - RUST_LOG=info

  rabbitmq:
    image: rabbitmq:3.12-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: rabbituser
      RABBITMQ_DEFAULT_PASS: rabbitpass
      RABBITMQ_DEFINITIONS_FILE: "/etc/rabbitmq/definitions.json"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  database-postgres-jobads:
  database-postgres-scheduler:
  rabbitmq-data:
