name: gather-it

services:
  jobReadApi:
    image: gather-it-jobreadapi:latest
    build:
      context: ../JobReadApi
      dockerfile: JobReadApi.WebApi/Dockerfile
    ports:
      - "8002:8080"
    depends_on:
      postgres-jobads:
        condition: service_healthy
    environment:
      - DB_CONNECTION_STRING=Host=postgres-jobads;Port=5432;Database=postgres;Username=postgres;Password=pL5dT78Uyu
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gatherit:
    build:
      context: ../Comulator
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://rabbituser:rabbitpass@rabbitmq:5672/%2f
      - KAFKA_URL=kafka:9092

  postgres-jobads:
    build:
      context: ../Database
      dockerfile: Dockerfile-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pL5dT78Uyu
      POSTGRES_DB: postgres
    ports:
      - "5400:5432"
    volumes:
      - database-postgres-jobads:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-scheduler:
    build:
      context: ../scheduler/database
      dockerfile: Dockerfile-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jad21D10cazX
      POSTGRES_DB: postgres
    ports:
      - "5401:5432"
    volumes:
      - database-postgres-scheduler:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: ../scheduler
      dockerfile: Dockerfile
    ports:
      - "8101:8101"
    depends_on:
      postgres-scheduler:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:jad21D10cazX@postgres-scheduler:5432/postgres
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:8101/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pracuj-scraper:
    build:
      context: ../scrapyard/pracuj-scraper
      dockerfile: Dockerfile
    ports:
      - "8800:8800"
    depends_on:
      rabbitmq:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://rabbituser:rabbitpass@rabbitmq:5672/%2f
      - RABBITMQ_EXCHANGE=mapping_exchange
      - RABBITMQ_ROUTING_KEY=mapping
      - SCHEDULER_URL=http://scheduler:8101/register
      - SCRAPER_ENDPOINT=http://pracuj-scraper:8800/scrap
      - ASPNETCORE_URLS=http://+:8001
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:8800/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  justjoinit-scraper:
    build:
      context: ../scrapyard/justjoinit-scraper
      dockerfile: Dockerfile
    ports:
      - "8801:8801"
    depends_on:
      rabbitmq:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://rabbituser:rabbitpass@rabbitmq:5672/%2f
      - RABBITMQ_EXCHANGE=mapping_exchange
      - RABBITMQ_ROUTING_KEY=mapping
      - SCHEDULER_URL=http://scheduler:8101/register
      - SCRAPER_ENDPOINT=http://justjoinit-scraper:8801/scrap
      - "API_URL=https://api.justjoin.it/v2/user-panel/offers/?&sortBy=published&orderBy=DESC&perPage=100&salaryCurrencies=PLN&page="
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8801/healthcheck'')" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  theprotocolit-scraper:
    build:
      context: ../scrapyard/theprotocolit-scraper
      dockerfile: Dockerfile
    ports:
      - "8802:8802"
    depends_on:
      rabbitmq:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://rabbituser:rabbitpass@rabbitmq:5672/%2f
      - RABBITMQ_EXCHANGE=mapping_exchange
      - RABBITMQ_ROUTING_KEY=mapping
      - SCHEDULER_URL=http://scheduler:8101/register
      - SCRAPER_ENDPOINT=http://theprotocolit-scraper:8802/scrap
      - "API_URL=https://apus-api.theprotocol.it/offers/_search?orderby.field=Relevance&pageSize=50&pageNumber="
      - "TP_XSRF_TOKEN=CfDJ8Ezt3dO9bWlKhqfe7qrrhyPvO6t6ZijadQv4THIqVdKxlCp4mMH-F3FONNdSLgOHgfo78klmEG20uB-_kU-zrmYXLFjmMQJ3bXKs5rW57coe0sEj3z5Ss5yVg6diJXTJ08zxPYL_cCwP4wvlfM65PHI"
