name: .NET

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore gatherIt.sln
      - name: Build
        run: dotnet build gatherIt.sln --no-restore

  format:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Check code formatting with dotnet format
        run: dotnet format gatherIt.sln --no-restore --verify-no-changes --severity warn --report ./format.json

  comulator-test:
    runs-on: ubuntu-latest
    needs:
      - build
      - format

    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Running tests
        run: dotnet test gatherIt.sln --verbosity normal
