name: .NET

on:
  push:
    branches: ["master"]
    paths:
      - "JobReadApi/**"
      - ".github/workflows/dotnet.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "JobReadApi/**"
      - ".github/workflows/dotnet.yml"

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Check code formatting with dotnet format
        run: dotnet format gatherIt.sln --no-restore --verify-no-changes --severity warn --report ./format.json

  build:
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore gatherIt.sln
      - name: Build
        run: dotnet build gatherIt.sln --no-restore
